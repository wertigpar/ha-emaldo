set_slot_range:
  name: Set slot range
  description: Override a time range with a specific charge/discharge action.
  fields:
    start_time:
      name: Start time
      description: Start time in HH:MM format (e.g., "01:00").
      required: true
      example: "01:00"
      selector:
        time:
    end_time:
      name: End time
      description: End time in HH:MM format (e.g., "05:00").
      required: true
      example: "05:00"
      selector:
        time:
    action:
      name: Action
      description: The override action for the time range.
      required: true
      example: charge-low
      selector:
        select:
          options:
            - charge-low
            - charge-high
            - charge-100
            - idle
            - discharge-low
            - discharge-high
            - clear
    high_marker:
      name: High marker
      description: High battery threshold percentage (default 72).
      default: 72
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"
    low_marker:
      name: Low marker
      description: Low battery threshold percentage (default 20).
      default: 20
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"

apply_bulk_schedule:
  name: Apply bulk schedule
  description: Push a full 96-slot override array to the battery. Useful for EMHASS/AIO integration.
  fields:
    slots:
      name: Slots
      description: "Array of 96 integer values (0-255). 128 = no override, 0 = idle, 1-100 = charge at N%, >128 = discharge."
      required: true
      example: "[128, 128, 128, 128, 20, 20, 20, 20, 72, 72, 72, 72, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 184, 184, 184, 184, 184, 184, 184, 184, 128, 128, 128, 128, 0, 0, 0, 0, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128, 128]"
      selector:
        object:
    high_marker:
      name: High marker
      description: High battery threshold percentage (default 72).
      default: 72
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"
    low_marker:
      name: Low marker
      description: Low battery threshold percentage (default 20).
      default: 20
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"

reset_to_internal:
  name: Reset to internal
  description: Clear overrides, returning to the AI schedule.
  fields:
    start_time:
      name: Start time
      description: "Start time in HH:MM format. Required unless 'all' is true."
      example: "01:00"
      selector:
        time:
    end_time:
      name: End time
      description: "End time in HH:MM format. Required unless 'all' is true."
      example: "05:00"
      selector:
        time:
    all:
      name: Reset all
      description: If true, reset all 96 slots. Ignores start_time/end_time.
      default: false
      selector:
        boolean:
    high_marker:
      name: High marker
      description: High battery threshold percentage (default 72).
      default: 72
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"
    low_marker:
      name: Low marker
      description: Low battery threshold percentage (default 20).
      default: 20
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"

refresh_schedule:
  name: Refresh schedule
  description: Manually trigger a schedule and override data refresh.

set_ev_schedule:
  name: Set EV charging schedule
  description: >
    Switches the EV charger to Smart → Scheduled mode and writes weekday
    and weekend hour bitmaps. Each list contains hour integers 0-23
    when charging is allowed; empty list = no hours selected for that
    day type.
  fields:
    weekdays:
      name: Weekday hours
      description: "List of hour integers 0-23 when EV charging is allowed on weekdays."
      example: "[6, 7, 22, 23]"
      selector:
        object:
    weekend:
      name: Weekend hours
      description: "List of hour integers 0-23 when EV charging is allowed on weekends."
      example: "[10, 11, 12]"
      selector:
        object:
    sync:
      name: Sync to other devices
      description: Mirror the app's "Sync" toggle (propagates schedule to other devices in the home).
      default: false
      selector:
        boolean:

backfill_solar:
  name: Backfill solar energy history
  description: >
    Fetches up to 30 days of historical solar production data from the
    Emaldo API and imports it as long-term statistics in Home Assistant.
    The backfilled data appears in the Energy Dashboard under
    "emaldo:solar_energy_backfill". Run once after initial setup.
  fields:
    days:
      name: Days
      description: "Number of days to backfill (1-90, default 30)."
      default: 30
      selector:
        number:
          min: 1
          max: 90
          step: 1

set_battery_range:
  name: Set AI Battery Range
  description: >
    Write the AI Battery Range — the SoC band the AI must operate within.
    Mirrors the app's Battery Range slider + override toggle. Sends opcode
    0x1AA0 with all 96 per-15-min slot overrides cleared to 0x80
    (no-override). Live-confirmed 2026-05-07 against Power Core 2.0.
  fields:
    smart_pct:
      name: Smart reserve %
      description: Upper SoC threshold of the AI operating band (0-100).
      required: true
      example: 50
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"
    emergency_pct:
      name: Emergency reserve %
      description: >
        Lower SoC threshold of the AI operating band (0-100). Must be
        less than or equal to smart_pct.
      required: true
      example: 10
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"
    enable:
      name: Override active
      description: >
        True (default) activates "Battery Range = override" — AI is constrained
        to [emergency_pct, smart_pct]. False reverts to "Battery Range = AI" —
        the markers are persisted but AI picks its own band.
      default: true
      example: true
      selector:
        boolean:
