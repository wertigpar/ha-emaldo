name: Validate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Python and JSON
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Validate Python syntax
        run: |
          python -m py_compile custom_components/emaldo/*.py
          python -m py_compile custom_components/emaldo/emaldo_lib/*.py

      - name: Validate manifest.json
        run: |
          python -c "import json; json.load(open('custom_components/emaldo/manifest.json'))"

      - name: Validate strings.json
        run: |
          python -c "import json; json.load(open('custom_components/emaldo/strings.json'))"

      - name: Validate services.yaml
        run: |
          python -c "import yaml; yaml.safe_load(open('custom_components/emaldo/services.yaml'))"

      - name: Validate hacs.json
        run: |
          python -c "import json; json.load(open('hacs.json'))"

  hassfest:
    runs-on: ubuntu-latest
    name: Hassfest Validation
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master
